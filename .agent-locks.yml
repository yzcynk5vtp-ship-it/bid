version: 1
# DEPRECATED — new locks should go to .agent-locks/<task-slug>.yml (per-task files).
# This single file is kept readable for backwards compatibility with existing locks
# and remote-branch scans. `npm run agent:lock-acquire` writes to per-task files now;
# `npm run agent:lock-check` reads union of legacy + per-task. See CLAUDE.md §5.
#
# Why: a single shared lock file caused near-constant rebase conflicts when
# multiple agents ran in parallel. Per-task files mean new tasks = new files = no
# conflicts. Existing entries here will age out via the daily janitor.
locks: []
