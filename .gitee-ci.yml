# Gitee Go CI/CD 配置
# 西域数智化投标管理平台 —— 远端代码质量与架构门禁
#
# 触发条件：Pull Request 以及 main 分支 push
# 当前阶段：治理 + 前端构建/单测 + 后端架构/质量 + E2E（手动）
# 变更范围检测：quality-scope 基于 git diff 决定哪些 job 需要执行
# 说明：FP-Java Profile 架构门禁由 backend-architecture-tests 负责
#      项目权限守卫由 backend-project-access-guard 负责
#      E2E 与 Flyway 容器测试因共享 Runner 资源限制，默认设为手动触发

variables:
  CI: "true"
  VITE_API_MODE: "api"
  VITE_API_BASE_URL: "http://127.0.0.1:18080"
  PLATFORM_ENCRYPTION_KEY: "ci-test-key-2026"
  PLATFORM_ACCOUNT_ENCRYPTION_KEY: "test-platform-encryption-key-2026"
  JWT_SECRET: "ci-e2e-jwt-secret-key-with-32-chars-min"
  GIT_DEPTH: "0"

stages:
  - governance
  - frontend
  - backend
  - e2e

# ─────────────────────────────────────────────────────────────────────────
# Governance 阶段 — 代码治理与门禁前置
# ─────────────────────────────────────────────────────────────────────────

quality-scope:
  stage: governance
  image: node:22
  cache:
    key: node-modules
    paths:
      - node_modules/
  script:
    - |
      if [ -n "${CI_MERGE_REQUEST_SOURCE_BRANCH_SHA:-}" ]; then
        BASE="$CI_MERGE_REQUEST_DIFF_BASE_SHA"
        [ -z "$BASE" ] && BASE="origin/${CI_MERGE_REQUEST_TARGET_BRANCH_NAME:-main}"
        HEAD="${CI_MERGE_REQUEST_SOURCE_BRANCH_SHA}"
      else
        BASE="origin/main"
        HEAD="${CI_COMMIT_SHA}"
        git fetch --no-tags origin main || true
      fi
      BACKEND_CHANGED=$(git diff --name-only $BASE $HEAD 2>/dev/null | grep -c "^backend/" || true)
      UI_CHANGED=$(git diff --name-only $BASE $HEAD 2>/dev/null | grep -c "^src/" || true)
      E2E_CHANGED=$(git diff --name-only $BASE $HEAD 2>/dev/null | grep -c "^e2e/" || true)
      DOC_CHANGED=$(git diff --name-only $BASE $HEAD 2>/dev/null | grep -c "\.md$" || true)
      echo "backend_changed=$BACKEND_CHANGED" >> build.env
      echo "ui_changed=$UI_CHANGED" >> build.env
      echo "e2e_changed=$E2E_CHANGED" >> build.env
      echo "doc_changed=$DOC_CHANGED" >> build.env
      cat build.env
  artifacts:
    reports:
      dotenv: build.env
  only:
    - merge_requests
    - main

governance-agent-locks:
  stage: governance
  image: node:22
  needs: []
  cache:
    key: node-modules
    paths:
      - node_modules/
  script:
    - |
      if [ -n "${CI_MERGE_REQUEST_SOURCE_BRANCH_SHA:-}" ]; then
        BASE="origin/${CI_MERGE_REQUEST_TARGET_BRANCH_NAME:-main}"
        HEAD="${CI_MERGE_REQUEST_SOURCE_BRANCH_SHA}"
      else
        BASE="origin/main"
        HEAD="${CI_COMMIT_SHA}"
        git fetch --no-tags origin main || true
      fi
      node scripts/check-agent-locks.mjs --base "$BASE" --head "$HEAD"
  only:
    - merge_requests
    - main

governance-line-budget:
  stage: governance
  image: node:22
  needs: [quality-scope]
  cache:
    key: node-modules
    paths:
      - node_modules/
  script:
    - |
      if [ -n "${CI_MERGE_REQUEST_SOURCE_BRANCH_SHA:-}" ]; then
        BASE="origin/${CI_MERGE_REQUEST_TARGET_BRANCH_NAME:-main}"
        HEAD="${CI_MERGE_REQUEST_SOURCE_BRANCH_SHA}"
      else
        BASE="origin/main"
        HEAD="${CI_COMMIT_SHA}"
        git fetch --no-tags origin main || true
      fi
      node scripts/check-line-budgets.mjs --base "$BASE" --head "$HEAD"
  only:
    - merge_requests
    - main

governance-front-data-boundaries:
  stage: governance
  image: node:22
  needs: [quality-scope]
  cache:
    key: node-modules
    paths:
      - node_modules/
  script:
    - npm ci
    - npm run check:front-data-boundaries
  only:
    - merge_requests
    - main

governance-doc-governance:
  stage: governance
  image: node:22
  needs: [quality-scope]
  cache:
    key: node-modules
    paths:
      - node_modules/
  script:
    - npm ci
    - npm run check:doc-governance
  only:
    - merge_requests
    - main

# ─────────────────────────────────────────────────────────────────────────
# Frontend 阶段
# ─────────────────────────────────────────────────────────────────────────

frontend:
  stage: frontend
  image: node:22
  needs: [quality-scope, governance-line-budget]
  cache:
    key: node-modules
    paths:
      - node_modules/
  script:
    - |
      if [ "$ui_changed" = "0" ] || [ -z "$ui_changed" ]; then
        echo "No UI changes detected, skipping full frontend pipeline"
        exit 0
      fi
    - npm ci
    - npm run test:unit
    - npm run build
    - npm run build:api
  only:
    - merge_requests
    - main

# ─────────────────────────────────────────────────────────────────────────
# Backend 阶段
# ─────────────────────────────────────────────────────────────────────────

backend:
  stage: backend
  image: maven:3.9-eclipse-temurin-21
  needs: [quality-scope, governance-line-budget]
  cache:
    key: maven-repo
    paths:
      - /root/.m2/repository
  script:
    - |
      if [ "$backend_changed" = "0" ] || [ -z "$backend_changed" ]; then
        echo "No backend changes detected, running lightweight compile check"
        cd backend && mvn -DskipTests compile -q
        echo "Compile OK"
        exit 0
      fi
    - cd backend
    - mvn -DskipTests compile -q
    - mvn -DforkCount=0 -Dtest=FPJavaArchitectureTest,MaintainabilityArchitectureTest test
    - mvn -Dtest=ProjectAccessGuardCoverageTest test
    - mvn -Pjava-quality,java-quality-spotbugs,quality-strict -DskipTests -Djacoco.skip=true checkstyle:check pmd:check spotbugs:check
  only:
    - merge_requests
    - main

backend-quality-audit:
  stage: backend
  image: maven:3.9-eclipse-temurin-21
  needs: [quality-scope]
  cache:
    key: maven-repo
    paths:
      - /root/.m2/repository
  script:
    - |
      if [ "$backend_changed" = "0" ] || [ -z "$backend_changed" ]; then
        echo "No backend changes, skipping quality audit"
        exit 0
      fi
    - cd backend
    - mvn -Pjava-quality,java-quality-spotbugs,quality-audit checkstyle:check pmd:check spotbugs:check
  allow_failure: true
  only:
    - merge_requests
    - main

# ─────────────────────────────────────────────────────────────────────────
# E2E 阶段：默认手动触发
# ─────────────────────────────────────────────────────────────────────────

e2e:
  stage: e2e
  image: mcr.microsoft.com/playwright:v1.58.2-jammy
  needs: [frontend, backend]
  cache:
    key: node-modules
    paths:
      - node_modules/
  script:
    - |
      if [ "$ui_changed" = "0" ] || [ -z "$ui_changed" ]; then
        echo "No UI changes, skipping E2E"
        exit 0
      fi
    - npm ci
    - npx playwright install chromium
    - cd backend && mvn -DskipTests compile -q && cd ..
    - npm run build:api
    - |
      # 启动后端
      cd backend
      JWT_SECRET="$JWT_SECRET" \
      DB_PASSWORD="unused" \
      SPRING_PROFILES_ACTIVE=e2e \
      mvn spring-boot:run -Dspring-boot.run.arguments="--server.port=18080" &
      BACKEND_PID=$!
      sleep 30
    - |
      # 启动前端
      npx serve -s dist -l 1314 &
      FRONTEND_PID=$!
      sleep 5
    - npx playwright test --config playwright.config.js
    - kill $BACKEND_PID $FRONTEND_PID || true
  artifacts:
    when: always
    paths:
      - playwright-report/
  when: manual
  only:
    - merge_requests
    - main
