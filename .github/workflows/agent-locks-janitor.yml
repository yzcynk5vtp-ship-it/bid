name: Agent Locks Janitor

on:
  schedule:
    # Run daily at 2:17 AM UTC (off-peak, avoid :00 and :30)
    - cron: '17 2 * * *'
  workflow_dispatch:

# Daily cleanup of stale locks in both the legacy `.agent-locks.yml` and the
# per-task `.agent-locks/*.yml` stores. A lock is stale if:
# - its branch is gone from origin (orphan), OR
# - expiresAt is >24h in the past AND the branch has no commits in the past 24h
#
# When a per-task file's last lock is pruned, the file itself is deleted.
#
# This prevents the lock stores from accumulating expired entries that condition
# everyone to ignore lock warnings. See ericforai/bidding#230.
#
# Pruning is done via direct push to main. This avoids the previous deadlock where:
# 1. janitor opened a PR with `[skip ci]`, so CI never ran → required status
#    checks stayed pending forever → auto-merge was blocked.
# 2. required_linear_history: true on main blocked plain merge, leaving squash/rebase
#    as the only options, but both also need status checks.
#
# Workflows authenticated with GITHUB_TOKEN bypass branch protection (GH008), so
# the direct push lands immediately. Only .agent-locks files change, which only
# affects the lightweight agent-locks and line-budget checks in CI.

jobs:
  prune-stale-locks:
    name: Prune stale expired locks
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run agent-locks-prune
        id: prune
        run: |
          node scripts/agent-locks-prune.mjs > prune.log 2>&1
          cat prune.log
          if grep -q "removed.*stale lock" prune.log; then
            echo "pruned=true" >> $GITHUB_OUTPUT
          else
            echo "pruned=false" >> $GITHUB_OUTPUT
          fi

      - name: Push pruned locks directly to main
        if: steps.prune.outputs.pruned == 'true'
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stage both legacy single file and per-task directory. `-A` on the
          # directory picks up deletions (per-task files unlinked when emptied).
          git add -A .agent-locks.yml .agent-locks/

          # Safety: only commit if prune actually changed something.
          if git diff --cached --quiet; then
            echo "agent-locks-janitor: prune script reported changes but git sees no diff; aborting."
            exit 1
          fi

          git commit -m "chore(locks): prune stale expired locks"

          # Sync with main before pushing to avoid non-fast-forward rejection
          # when main received updates during this run.
          git pull --rebase origin main

          git push origin HEAD:main
