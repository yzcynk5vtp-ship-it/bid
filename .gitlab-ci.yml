# Gitee CI / GitLab CI 配置
# 西域数智化投标管理平台 —— 远端代码质量与架构门禁
#
# 触发条件：push 到 main/master/agent/**/codex/**，或任意 Merge Request
# 当前阶段：核心门禁（治理 + 前端构建/单测 + 后端架构/质量）
# E2E 与 Flyway 容器测试因共享 Runner 资源限制，默认不自动执行，可手动触发或第二阶段接入私有 Runner 后开启

variables:
  # 让 CI 脚本识别当前为持续集成环境
  CI: "true"
  VITE_API_MODE: "api"
  VITE_API_BASE_URL: "http://127.0.0.1:18080"
  # 编译/测试用占位密钥，不会进入生产
  PLATFORM_ENCRYPTION_KEY: "ci-test-key-2026"
  PLATFORM_ACCOUNT_ENCRYPTION_KEY: "test-platform-encryption-key-2026"
  JWT_SECRET: "ci-e2e-jwt-secret-key-with-32-chars-min"
  # 完整 Git 历史，方便 merge-base 与门禁脚本计算 diff 范围
  GIT_DEPTH: "0"

stages:
  - governance
  - frontend
  - backend
  - e2e

# ─────────────────────────────────────────────────────────────────────────
# 公共模板
# ─────────────────────────────────────────────────────────────────────────
.node_base: &node_base
  image: node:22
  cache:
    - key:
        files:
          - package-lock.json
      paths:
        - node_modules/
      policy: pull-push

.maven_base: &maven_base
  image: maven:3.9-eclipse-temurin-21
  cache:
    - key:
        files:
          - backend/pom.xml
      paths:
        - /root/.m2/repository
      policy: pull-push

# ─────────────────────────────────────────────────────────────────────────
# Governance 阶段：轻量、快速、所有变更都跑
# ─────────────────────────────────────────────────────────────────────────
governance:agent-locks:
  <<: *node_base
  stage: governance
  script:
    - git fetch --no-tags origin main
    - |
      if [ -n "${CI_MERGE_REQUEST_SOURCE_BRANCH_SHA:-}" ]; then
        BASE="origin/${CI_MERGE_REQUEST_TARGET_BRANCH_NAME:-main}"
        HEAD="${CI_MERGE_REQUEST_SOURCE_BRANCH_SHA}"
      else
        BASE="origin/main"
        HEAD="${CI_COMMIT_SHA}"
      fi
      node scripts/check-agent-locks.mjs --base "$BASE" --head "$HEAD"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'

# 注意：line-budget 需要 package-lock.json 存在才能 npm ci，但治理阶段不必须安装依赖
# 该脚本只读 git 历史与 source 文件，因此放在 node 镜像下直接运行即可
governance:line-budget:
  <<: *node_base
  stage: governance
  needs: []
  script:
    - git fetch --no-tags origin main
    - |
      if [ -n "${CI_MERGE_REQUEST_SOURCE_BRANCH_SHA:-}" ]; then
        BASE="origin/${CI_MERGE_REQUEST_TARGET_BRANCH_NAME:-main}"
        HEAD="${CI_MERGE_REQUEST_SOURCE_BRANCH_SHA}"
      else
        BASE="origin/main"
        HEAD="${CI_COMMIT_SHA}"
      fi
      node scripts/check-line-budgets.mjs --base "$BASE" --head "$HEAD"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'

governance:front-data-boundaries:
  <<: *node_base
  stage: governance
  needs: []
  script:
    - npm ci
    - npm run check:front-data-boundaries
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'

governance:doc-governance:
  <<: *node_base
  stage: governance
  needs: []
  script:
    - npm ci
    - npm run check:doc-governance
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'

governance:token-governance:
  <<: *node_base
  stage: governance
  needs: []
  script:
    - npm ci
    - npm run check:token-governance
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'

# ─────────────────────────────────────────────────────────────────────────
# Frontend 阶段：单测 + API 模式构建
# ─────────────────────────────────────────────────────────────────────────
frontend:install:
  <<: *node_base
  stage: frontend
  needs: []
  script:
    - npm ci
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'

frontend:unit-tests:
  <<: *node_base
  stage: frontend
  needs: ["frontend:install"]
  script:
    - npm ci
    - npm run test:unit
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'

frontend:build-api:
  <<: *node_base
  stage: frontend
  needs: ["frontend:install"]
  script:
    - npm ci
    - npm run build:api
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'

frontend:lint:
  <<: *node_base
  stage: frontend
  needs: ["frontend:install"]
  script:
    - npm ci
    - npm run lint
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'

# ─────────────────────────────────────────────────────────────────────────
# Backend 阶段：编译 + 架构测试 + 质量门禁
# ─────────────────────────────────────────────────────────────────────────
backend:compile:
  <<: *maven_base
  stage: backend
  needs: []
  script:
    - cd backend
    - mvn -DskipTests compile -q
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'

backend:architecture-tests:
  <<: *maven_base
  stage: backend
  needs: ["backend:compile"]
  script:
    - cd backend
    - mvn -DforkCount=0 -Dtest=FPJavaArchitectureTest,MaintainabilityArchitectureTest,ArchitectureTest test
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'

backend:project-access-guard:
  <<: *maven_base
  stage: backend
  needs: ["backend:compile"]
  script:
    - cd backend
    - mvn -Dtest=ProjectAccessGuardCoverageTest test
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'

backend:quality-gates:
  <<: *maven_base
  stage: backend
  needs: ["backend:compile"]
  script:
    - cd backend
    - mvn -Pjava-quality,java-quality-spotbugs,quality-strict -DskipTests -Djacoco.skip=true checkstyle:check pmd:check spotbugs:check
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'

# ─────────────────────────────────────────────────────────────────────────
# E2E 阶段：默认不自动跑，需手动触发或接入私有 Runner 后启用
# ─────────────────────────────────────────────────────────────────────────
e2e:commercial-flow:
  <<: *node_base
  stage: e2e
  needs: ["frontend:build-api", "backend:compile"]
  image: mcr.microsoft.com/playwright:v1.58.2-jammy
  script:
    - npm ci
    - npx playwright install chromium
    - cd backend && mvn -DskipTests compile -q && cd ..
    - |
      SPRING_PROFILES_ACTIVE=e2e \
      DB_PASSWORD=unused \
      JWT_SECRET="$JWT_SECRET" \
      npm run test:e2e:commercial
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: manual
      allow_failure: true
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
      allow_failure: true
