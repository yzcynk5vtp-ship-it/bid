spring:
  application:
    name: xiyu-bid-poc

  datasource:
    url: "${DB_URL:jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:xiyu_bid_main}?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai}"
    username: ${DB_USERNAME:xiyu_user}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false
        type:
          preferred_enum_type: jdbc

  flyway:
    enabled: true
    locations: classpath:db/migration-mysql
    baseline-on-migrate: false
    validateOnMigrate: false
    validateOnNervousSystems: false
    outOfOrder: true

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      accept-empty-string-as-null-object: true

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true
      group:
        readiness:
          include: readinessState,db

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}
  refresh-expiration: 604800000

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS}

xiyu:
  public-base-url: ${XIYU_PUBLIC_BASE_URL:}

app:
  bootstrap:
    admin:
      username: ${ADMIN_USERNAME:admin}
      password: ${ADMIN_PASSWORD}
      email: ${ADMIN_EMAIL:admin@xiyu-local}
      full-name: ${ADMIN_FULL_NAME:系统管理员}

rate:
  limit:
    login:
      max-attempts: ${RATE_LIMIT_LOGIN_MAX:5}
      window-minutes: ${RATE_LIMIT_LOGIN_WINDOW:15}

logging:
  level:
    com.xiyu: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
  # 日志文件路径在 logback-spring.xml 中通过 LOG_PATH 环境变量统一控制，
  # 避免 Spring Boot 默认 file appender 与自定义 logback 配置冲突。

# Sentry 生产环境配置
# DSN 必须通过 SENTRY_DSN 环境变量注入（无 DSN 时 Sentry 自动禁用）
sentry:
  dsn: ${SENTRY_DSN:}
  environment: ${SENTRY_ENVIRONMENT:production}
  traces-sample-rate: ${SENTRY_TRACES_SAMPLE_RATE:0.1}
  send-default-pii: false
