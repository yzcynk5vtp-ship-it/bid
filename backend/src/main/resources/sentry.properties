# Sentry 错误追踪配置
# DSN 通过环境变量 SENTRY_DSN 注入，此处为默认降级值（无 DSN 时 Sentry 自动禁用）
dsn=${SENTRY_DSN:}

# 采样率
# traces-sample-rate: 性能追踪采样（0.0-1.0），生产建议 0.1-0.3
traces-sample-rate=${SENTRY_TRACES_SAMPLE_RATE:0.0}
# 异常上报采样率（默认 1.0 = 全部上报）
sample-rate=${SENTRY_SAMPLE_RATE:1.0}

# 发布版本：从 git.properties 读取（git-commit-id-maven-plugin 自动生成）
# 支持通过 SENTRY_RELEASE 环境变量覆盖
release=${SENTRY_RELEASE:}

# 日志框架集成：将 logback ERROR/WARN 自动关联到 Sentry 事件
enable-tracing=${SENTRY_ENABLE_TRACING:true}
send-default-pii=${SENTRY_SEND_DEFAULT_PII:false}

# 忽略特定异常（这些是正常的业务拒绝，不是系统缺陷）
# 由 SentryConfig 中的 beforeSend 回调过滤