<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>投标管理系统 - 项目立项流程图</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    
    .flowchart-container {
      position: relative;
      width: 100%;
      height: 520px;
      background: 
        linear-gradient(rgba(200, 200, 200, 0.2) 1px, transparent 1px),
        linear-gradient(90deg, rgba(200, 200, 200, 0.2) 1px, transparent 1px);
      background-size: 20px 20px;
      border-radius: 12px;
      overflow: hidden;
    }
    
    .node {
      position: absolute;
      padding: 10px 14px;
      border-radius: 8px;
      cursor: grab;
      user-select: none;
      transition: box-shadow 0.2s;
      font-size: 12px;
      min-width: 90px;
      text-align: center;
      border: 2px solid;
    }
    
    .node:hover { box-shadow: 0 6px 20px rgba(0,0,0,0.12); }
    .node:active { cursor: grabbing; }
    
    .node-title { font-weight: 600; }
    .node-desc { font-size: 10px; opacity: 0.75; margin-top: 2px; }
    
    .node-system { background: #DBEAFE; border-color: #3B82F6; color: #1E40AF; }
    .node-bidding { background: #EDE9FE; border-color: #8B5CF6; color: #5B21B6; }
    .node-phase { background: #D1FAE5; border-color: #10B981; color: #047857; }
    .node-decision { background: #FEF3C7; border-color: #F59E0B; color: #92400E; }
    .node-error { background: #FEE2E2; border-color: #EF4444; color: #991B1B; }
    .node-external { background: #CCFBF1; border-color: #14B8A6; color: #0F766E; }
    
    .connections { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
    .connections path { fill: none; stroke: #9CA3AF; stroke-width: 2; marker-end: url(#arrowhead); }
    .connections path.dashed { stroke-dasharray: 5, 5; }
    .connections text { fill: #6B7280; font-size: 10px; }
    
    .legend-color { width: 14px; height: 14px; border-radius: 3px; border: 2px solid; display: inline-block; }
  </style>
</head>
<body class="bg-gray-100 p-6">
  <div class="max-w-6xl mx-auto">
    <div class="bg-white rounded-xl shadow-sm p-4 mb-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <h1 class="text-lg font-bold text-blue-600">投标管理系统 - 项目立项流程图</h1>
        <span class="text-xs px-2 py-0.5 bg-gray-200 rounded">v1.0</span>
      </div>
      <button onclick="resetPositions()" class="text-sm px-3 py-1 bg-gray-100 hover:bg-gray-200 rounded">🔄 重置</button>
    </div>
    
    <div class="bg-white rounded-xl shadow-lg p-4 mb-4">
      <div class="flex gap-4 text-xs mb-3 pb-3 border-b">
        <span class="flex items-center gap-1"><span class="legend-color" style="background:#DBEAFE; border-color:#3B82F6;"></span> 标讯系统</span>
        <span class="flex items-center gap-1"><span class="legend-color" style="background:#CCFBF1; border-color:#14B8A6;"></span> CRM 系统</span>
        <span class="flex items-center gap-1"><span class="legend-color" style="background:#FEF3C7; border-color:#F59E0B;"></span> 判断节点</span>
        <span class="flex items-center gap-1"><span class="legend-color" style="background:#D1FAE5; border-color:#10B981;"></span> 项目阶段</span>
      </div>
      
      <div class="flowchart-container" id="flowchart">
        <svg class="connections" id="connections">
          <defs>
            <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
              <polygon points="0 0, 8 3, 0 6" fill="#9CA3AF"/>
            </marker>
          </defs>
        </svg>
        
        <!-- 标讯系统 -->
        <div class="node node-system" id="news-source" style="left:40px;top:20px;">
          <div class="node-title">📰 标讯系统</div>
        </div>
        
        <!-- 标讯评估（通过） -->
        <div class="node node-decision" id="eval-pass" style="left:220px;top:20px;">
          <div class="node-title">✓ 标讯评估</div>
        </div>
        
        <!-- CRM 系统 -->
        <div class="node node-external" id="crm-system" style="left:40px;top:300px;">
          <div class="node-title">📊 CRM 系统</div>
          <div class="node-desc">商机管理/客户跟进</div>
        </div>
        
        <!-- 一键触发 -->
        <div class="node node-external" id="crm-trigger" style="left:220px;top:300px;">
          <div class="node-title">🔘 发起投标</div>
        </div>
        
        <!-- 信息同步 -->
        <div class="node node-bidding" id="info-sync" style="left:400px;top:300px;">
          <div class="node-title">📥 信息同步</div>
          <div class="node-desc">客户/商机</div>
        </div>
        
        <!-- 创建投标项目 -->
        <div class="node node-bidding" id="project-create" style="left:400px;top:80px;">
          <div class="node-title">📋 创建投标项目</div>
        </div>
        
        <!-- 六大阶段 -->
        <div class="node node-phase" id="phase1" style="left:600px;top:20px;">
          <div class="node-title">1️⃣ 项目立项</div>
        </div>
        
        <div class="node node-phase" id="phase2" style="left:730px;top:20px;">
          <div class="node-title">2️⃣ 标书制作</div>
        </div>
        
        <div class="node node-phase" id="phase3" style="left:730px;top:100px;">
          <div class="node-title">3️⃣ 评标中</div>
        </div>
        
        <div class="node node-phase" id="phase4" style="left:730px;top:180px;">
          <div class="node-title">4️⃣ 结果确认</div>
        </div>
        
        <div class="node node-phase" id="phase5" style="left:730px;top:260px;">
          <div class="node-title">5️⃣ 项目复盘</div>
        </div>
        
        <div class="node node-phase" id="phase6" style="left:730px;top:340px;">
          <div class="node-title">6️⃣ 项目结项</div>
        </div>
      </div>
    </div>
    
    <div class="bg-white rounded-xl shadow-sm p-4">
      <h3 class="text-sm font-semibold mb-3">流程说明</h3>
      <div class="grid grid-cols-2 gap-4 text-xs">
        <div class="p-3 bg-blue-50 rounded-lg">
          <div class="font-medium text-blue-800 mb-1">📰 方式一：标讯评估</div>
          <div class="text-blue-700">标讯系统发现商机 → 评估通过 → 直接进入项目立项</div>
        </div>
        <div class="p-3 bg-teal-50 rounded-lg">
          <div class="font-medium text-teal-800 mb-1">📊 方式二：CRM 一键触发</div>
          <div class="text-teal-700">CRM 点击「投标」按钮 → 跳转投标系统 → 同步客户/商机信息 → 项目立项</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // 连接定义 [起点ID, 终点ID, 标签, 是否虚线]
    const connections = [
      ['news-source', 'eval-pass', '', false],
      ['eval-pass', 'project-create', '通过', false],
      ['crm-system', 'crm-trigger', '', false],
      ['crm-trigger', 'info-sync', '', false],
      ['crm-trigger', 'project-create', '同步', true],
      ['info-sync', 'project-create', '', false],
      ['project-create', 'phase1', '', false],
      ['phase1', 'phase2', '', false],
      ['phase2', 'phase3', '', false],
      ['phase3', 'phase4', '', false],
      ['phase4', 'phase5', '', false],
      ['phase5', 'phase6', '', false],
    ];
    
    let draggedNode = null;
    let offsetX = 0;
    let offsetY = 0;
    
    // 初始化拖拽
    document.querySelectorAll('.node').forEach(n => {
      n.addEventListener('mousedown', e => {
        draggedNode = n;
        const r = n.getBoundingClientRect();
        offsetX = e.clientX - r.left;
        offsetY = e.clientY - r.top;
      });
    });
    
    document.addEventListener('mousemove', e => {
      if (!draggedNode) return;
      const c = document.getElementById('flowchart').getBoundingClientRect();
      let x = e.clientX - c.left - offsetX;
      let y = e.clientY - c.top - offsetY;
      x = Math.max(0, Math.min(x, c.width - draggedNode.offsetWidth));
      y = Math.max(0, Math.min(y, c.height - draggedNode.offsetHeight));
      draggedNode.style.left = x + 'px';
      draggedNode.style.top = y + 'px';
      drawConnections();
    });
    
    document.addEventListener('mouseup', () => { draggedNode = null; });
    
    // 绘制连接线
    function drawConnections() {
      const svg = document.getElementById('connections');
      svg.querySelectorAll('path,text').forEach(e => e.remove());
      
      connections.forEach(([fromId, toId, label, dashed]) => {
        const fe = document.getElementById(fromId);
        const te = document.getElementById(toId);
        if (!fe || !te) return;
        
        const fx = fe.offsetLeft + fe.offsetWidth / 2;
        const fy = fe.offsetTop + fe.offsetHeight;
        const tx = te.offsetLeft + te.offsetWidth / 2;
        const ty = te.offsetTop;
        const mid = (fy + ty) / 2;
        
        const p = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        p.setAttribute('d', `M${fx},${fy} C${fx},${mid} ${tx},${mid} ${tx},${ty}`);
        if (dashed) p.style.strokeDasharray = '5,5';
        svg.appendChild(p);
        
        if (label) {
          const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
          t.setAttribute('x', (fx + tx) / 2);
          t.setAttribute('y', mid - 5);
          t.setAttribute('text-anchor', 'middle');
          t.textContent = label;
          svg.appendChild(t);
        }
      });
    }
    
    // 重置位置
    function resetPositions() {
      const defaults = {
        'news-source': 'left:40px;top:20px',
        'eval-pass': 'left:220px;top:20px',
        'crm-system': 'left:40px;top:300px',
        'crm-trigger': 'left:220px;top:300px',
        'info-sync': 'left:400px;top:300px',
        'project-create': 'left:400px;top:80px',
        'phase1': 'left:600px;top:20px',
        'phase2': 'left:730px;top:20px',
        'phase3': 'left:730px;top:100px',
        'phase4': 'left:730px;top:180px',
        'phase5': 'left:730px;top:260px',
        'phase6': 'left:730px;top:340px'
      };
      
      Object.entries(defaults).forEach(([id, style]) => {
        const el = document.getElementById(id);
        if (el) el.style.cssText = style;
      });
      
      drawConnections();
    }
    
    // 页面加载时绘制连接线
    window.addEventListener('DOMContentLoaded', drawConnections);
  </script>
</body>
</html>
