# 西域数智化投标管理平台 — 全容器开发/演示环境
# 使用方式：
#   cd backend && mvn package -DskipTests                     # 先编译后端
#   npm run build                                              # 先构建前端
#   docker compose up -d                                      # 启动除 MySQL 外的服务（前端/后端/Redis/sidecar）
#   docker compose --profile infra up -d                      # 含 MySQL 的一键启动（mysql 服务在 infra profile 下）
#   docker compose logs -f                                    # 查看所有日志
#   docker compose down                                       # 停止所有服务
#
# 代码变更后：重新编译对应模块 + docker compose restart <service>

services:
  mysql:
    image: mysql:8.0
    container_name: xiyu-bid-mysql
    restart: unless-stopped
    profiles:
      - infra
    environment:
      MYSQL_ROOT_PASSWORD: XiyuRoot!2026
      MYSQL_DATABASE: xiyu_bid_main
      MYSQL_USER: xiyu_user
      MYSQL_PASSWORD: XiyuDB!2026
    ports:
      - "13306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "xiyu_user", "-pXiyuDB!2026"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - xiyu-net

  redis:
    image: redis:6.2-alpine  # 与生产 6.2.19 保持一致
    container_name: xiyu-bid-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - xiyu-net

  sidecar:
    build:
      context: ./document-converter-sidecar
      dockerfile: Dockerfile
    container_name: xiyu-bid-sidecar
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      SIDECAR_HOST: "0.0.0.0"
      SIDECAR_PORT: "8000"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - xiyu-net

  backend:
    image: eclipse-temurin:23-jdk
    container_name: xiyu-bid-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      sidecar:
        condition: service_started
    ports:
      - "18080:18080"
    volumes:
      - ./backend/target/bid-poc-1.0.3.jar:/app/bid-poc.jar:ro
    environment:
      JWT_SECRET: xiyu-bid-poc-local-dev-secret-key-please-change-in-prod-32bytes-min
      SPRING_PROFILES_ACTIVE: dev
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: xiyu_bid_main
      DB_USERNAME: xiyu_user
      DB_PASSWORD: XiyuDB!2026
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: "0"
      SPRING_DATA_REDIS_DATABASE: "0"
      SERVER_PORT: "18080"
      CORS_ALLOWED_ORIGINS: "http://localhost:1314,http://127.0.0.1:1314"
    working_dir: /app
    command: ["java", "-XX:+UseZGC", "-Xms256m", "-Xmx512m", "-jar", "/app/bid-poc.jar"]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:18080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - xiyu-net

  frontend:
    image: nginx:alpine
    container_name: xiyu-bid-frontend
    restart: unless-stopped
    ports:
      - "1314:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./dist:/usr/share/nginx/html:ro
    depends_on:
      backend:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - xiyu-net

networks:
  xiyu-net:
    name: xiyu-bid-dev
    driver: bridge

volumes:
  mysql-data:
    name: xiyu-bid-mysql-data
