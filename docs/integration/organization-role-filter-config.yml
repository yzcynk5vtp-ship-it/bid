# OSS 组织架构同步角色白名单配置示例
# 用法：复制到对应环境的 application.yml / application-prod.yml，或转为环境变量注入。
# 关键开关：skip-unmapped-users=true 时，未命中任何映射的 OSS 用户不会被创建；
#           若本地已存在，则禁用（禁止登录）。
#
# 说明：
# - personToRoleMappings：按人员精确匹配（支持邮箱、工号/用户名、姓名）。
#   建议优先使用邮箱或工号；姓名仅在 OSS 返回 name 字段与配置完全一致时才生效。
# - departmentToRoleMappings：按部门名称正则匹配。
# - positionToRoleMappings：按 OSS 返回的 roleCode/positionCode 正则匹配。
#
# 注意：下面的人员映射是基于你提供的角色配置表，按“最高权限优先”原则暂定。
#       如果同一人需要多个角色，需要内部合并为一个 RoleProfile（如 bid_senior），
#       请根据实际业务调整 roleCode。

xiyu:
  integrations:
    organization:
      skip-unmapped-users: true

      # 按岗位映射（对应表格里的 role code）
      # 注意：bid-SystemAdmin 是 OSS 临时岗位，不建议在 positionToRoleMappings 中硬映射。
      #       如需赋予系统管理员权限，请用下面的 personToRoleMappings 按人员精确配置，
      #       这样 OSS 岗位变化后对应人员不会丢失权限。
      positionToRoleMappings:
        - positionPattern: "^/bidAdmin$"
          roleCode: bidAdmin
        - positionPattern: "^bid-TeamLeader$"
          roleCode: bid-TeamLeader
        - positionPattern: "^bid-Team$"
          roleCode: bid-Team
        - positionPattern: "^bid-projectLeader$"
          roleCode: bid-projectLeader
        - positionPattern: "^bid-administration$"
          roleCode: bid-administration
        # 跨部门协同人员暂未启用，不配映射
        # - positionPattern: "^bid-otherDept$"
        #   roleCode: ???

      # 按部门映射
      departmentToRoleMappings:
        - departmentPattern: "投标管理部"
          roleCode: bid-Team
        - departmentPattern: "行政部"
          roleCode: bid-administration

      # 按人员映射（支持邮箱、工号/用户名/姓名，优先级最高）。
      # 由于系统当前只能给用户绑定一个 RoleProfile，同一人命中多条时以第一条为准。
      personToRoleMappings:
        # 投标系统管理员 bid-SystemAdmin（OSS 临时岗位）。
        # 张頔、郑蓉蓉、袁思琪目前同时属于 /bidAdmin；由于系统只能绑定一个 RoleProfile，
        # 按最高权限原则统一给 admin。后续若 OSS 取消 bid-SystemAdmin，可把他们改回
        # bid_admin（张頔/郑蓉蓉）或 bid_senior（袁思琪）。
        - personIdentifier: "03595"                # 张頔：工号
          roleCode: admin
        - personIdentifier: "dean_zhang@ehsy.com"  # 张頔：邮箱
          roleCode: admin
        - personIdentifier: "06234"                  # 郑蓉蓉：工号
          roleCode: admin
        - personIdentifier: "tina_zheng1@ehsy.com"   # 郑蓉蓉：邮箱
          roleCode: admin
        - personIdentifier: "11484"                  # 袁思琪：工号
          roleCode: admin
        - personIdentifier: "suki_yuan@ehsy.com"     # 袁思琪：邮箱
          roleCode: admin
